headline: Sponsor a student.
intro: |-
  $30 a month covers tuition, books, daily meals, and materials for one child for the full school year. Every dollar goes to program costs — the board is unpaid, and 100% of project-designated gifts pass through to schools in the Chittagong Hill Tracts.
