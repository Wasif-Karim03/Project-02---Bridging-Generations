headline: Sponsor a student.
intro: |-
  $30 a month covers tuition, books, daily meals, and materials for one child for the full school year. Every dollar goes to program costs — the board is unpaid, and 100% of project-designated gifts pass through to schools in the Chittagong Hill Tracts.
monthlySuggestion: 30
suggestedAmounts: "15, 30, 60, 120, 250"
transactionSource: stripe
givebutterAccountId: ""
givebutterCampaignId: ""
afterDonateNote: |-
  Stripe emails your tax-deductible receipt automatically. Questions, changes, or a preference to give by check? Reach out and the board will route it.
afterDonateNoteFallback: |-
  Our donation form is being finalised. To give in the meantime, write to bridginggeneration20@gmail.com — the board confirms receipt and routes the gift by hand. Checks made out to "Bridging Generations" are also welcome; reply for mailing instructions.
thankYouBody: |-
  If you just gave, thank you — your contribution keeps one more student in the classroom. A tax-deductible receipt will arrive by email within the next few minutes.
thankYouBodyFallback: |-
  Thank you for getting in touch about giving. The board confirms receipt of every gift personally and will email you within two business days.
transactionSourceNote: |-
  Donations are processed by Stripe. Bridging Generations is a registered 501(c)(3) nonprofit — your gift is tax-deductible to the extent allowed by law.
faq:
  - question: Is my donation tax-deductible?
    answer: |-
      Yes. Bridging Generations is a registered 501(c)(3) nonprofit in the United States. Stripe issues your tax-deductible receipt automatically at the time of the gift.
  - question: How is my money used?
    answer: |-
      Every project-designated gift goes directly to program costs — tuition, books, meals, and school materials. The board is unpaid and operating overhead is carried by a small group of recurring donors.
  - question: Are there processing fees?
    answer: |-
      Stripe charges 2.9% + $0.30 per card transaction (1.5% + $0.30 once our nonprofit-discount application is approved). The org absorbs these unless you choose to cover them at checkout.
  - question: Can I cancel a recurring donation?
    answer: |-
      Any time. Your Stripe receipt includes a link to manage or cancel your recurring gift. No questions asked.
  - question: Can I give by check or wire?
    answer: |-
      Yes — email bridginggeneration20@gmail.com and we will send mailing instructions or wire details. Checks should be made out to "Bridging Generations".
  - question: Do you ship internationally?
    answer: |-
      Gifts from outside the United States are welcome via Stripe. U.S. tax-deduction rules apply only to U.S. taxpayers; please consult your local advisor for rules in your country.
