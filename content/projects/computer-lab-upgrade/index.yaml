title: Computer lab upgrade
summary: Ten refurbished laptops, a solar inverter, and a year of rural-grade connectivity for the new computer lab at Khagrachari Model High School.
body: |-
  The Khagrachari Model lab was built in 2019 but sat mostly unused — inconsistent grid power brown-outs kept damaging the old desktop machines. This upgrade replaces them with low-power refurbished laptops, a solar-backed inverter, and a full year of rural-grade broadband so students can take the national ICT exam without traveling three hours to the district centre.
