title: Library expansion
summary: A second reading room and 400 new Bangla- and English-language titles for Rangamati Lake-side School — paused while monsoon repairs finish.
body: |-
  The existing library at Rangamati Lake-side is a single twelve-foot room serving 280 students. This project adds a second reading room, 400 new titles in Bangla and English, and two librarian-trained senior students. The work is paused through May while flood-damage repairs to the adjoining classroom finish first — we'll resume in June once the building is dry.
fundingGoal: 6200
fundingRaised: 1800
status: paused
