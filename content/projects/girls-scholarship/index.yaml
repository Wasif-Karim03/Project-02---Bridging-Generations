title: Girls' scholarship fund
summary: Full-tuition sponsorships for girls whose families would otherwise stop schooling after grade five — keeping them in education through graduation.
body: |-
  In the Hill Tracts, girls are often pulled out of school after grade five to help at home. The Girls' Scholarship Fund covers full tuition, books, and uniforms through graduation, plus a small stipend that offsets the household labor a girl would otherwise be doing.
fundingGoal: 15000
fundingRaised: 15000
status: funded
