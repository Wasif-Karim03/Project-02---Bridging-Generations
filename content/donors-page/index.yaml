headline: Our Donors.
subhead: |-
  Gifts to Bridging Generations are anonymous by default. This page is our thank-you wall — every message below came from someone who asked only that we keep the work going.
totalDonorsLabel: donors and counting
thankYouMessages:
  - message: Thank you for the consistency. Seeing the quarterly updates is the part I look forward to most.
    year: 2024
  - message: My gift is small but I hope it adds up. Keep the lights on.
    year: 2024
  - message: Grateful to help a classroom I will probably never visit. That is the quiet gift of this work.
    year: 2024
  - message: Education changed my own life. Paying that forward, a little each month.
    year: 2023
  - message: For the teachers who show up every day before anyone else does.
    year: 2024
  - message: In memory of my grandmother, who never got to finish school.
    year: 2023
  - message: I set up a recurring gift after reading the field update about the new rain shelters.
    year: 2024
  - message: Keep going. The letters from the students are all the proof I need.
    year: 2023
  - message: For meals. A kid cannot learn hungry.
    year: 2024
  - message: Ten years from now I want to say I backed this work early.
    year: 2024
